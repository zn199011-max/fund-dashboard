<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基金投资仪表盘</title>
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.7/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f6f7f9;
  --card: #fff;
  --text: #1a1d26;
  --sub: #687086;
  --border: #e9ebf0;
  --green: #0ea371;
  --red: #e5484d;
  --amber: #d97706;
  --blue: #3b6df0;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Top bar ── */
.topbar {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 20px;
  flex-wrap: wrap; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.topbar-brand { font-weight: 700; font-size: .95em; white-space: nowrap; color: var(--text); }
.topbar-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; }
.topbar-time { font-size: .73em; color: var(--sub); margin-left: auto; white-space: nowrap; }
.topbar-refresh {
  font-size: .78em; color: var(--blue); cursor: pointer; border: none;
  background: #eef2ff; padding: 5px 12px; border-radius: 6px; font-weight: 600;
  white-space: nowrap; transition: opacity .15s;
}
.topbar-refresh:hover { opacity: .7; }

/* ── Market strip ── */
.market-strip {
  display: flex; gap: 12px; padding: 10px 20px; flex-wrap: wrap;
  background: #fff; border-bottom: 1px solid var(--border);
}
.market-item {
  display: flex; align-items: center; gap: 6px; font-size: .76em;
  padding: 5px 10px; background: #f8f9fb; border-radius: 6px; white-space: nowrap;
}
.market-item .mi-label { color: var(--sub); }
.market-item .mi-value { font-weight: 700; }
.market-item .mi-tag {
  font-size: .72em; padding: 1px 6px; border-radius: 4px; font-weight: 600;
}
.mi-tag.fear { background: #fef3c7; color: #92400e; }
.mi-tag.greed { background: #fee2e2; color: #991b1b; }
.mi-tag.neutral { background: #e5e7eb; color: #374151; }
.mi-tag.extreme { background: #fee2e2; color: #7f1d1d; }

/* ── Container ── */
.container { max-width: 1400px; margin: auto; padding: 16px 20px; }

/* ── Fund grid ── */
.fund-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
}
@media (max-width: 900px) { .fund-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .fund-grid { grid-template-columns: 1fr; } }

/* ── Card ── */
.card {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 18px 20px; display: flex; flex-direction: column; gap: 12px;
}

/* Card header */
.card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.card-name { font-weight: 700; font-size: .95em; flex: 1; }
.card-code { font-size: .73em; color: var(--sub); }
.card-badge {
  padding: 4px 12px; border-radius: 20px; font-size: .76em; font-weight: 700; white-space: nowrap;
  letter-spacing: .3px;
}
.badge-buy { background: #d1fae5; color: #065f46; }
.badge-watch { background: #fef3c7; color: #92400e; }
.badge-sell { background: #fee2e2; color: #991b1b; }

/* Metrics row */
.metrics {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.met {
  text-align: center; padding: 8px 4px; background: #f8f9fb; border-radius: 8px;
}
.met-label { font-size: .68em; color: var(--sub); margin-bottom: 2px; }
.met-value { font-size: .92em; font-weight: 700; }

/* PE bar */
.pe-row {
  display: flex; align-items: center; gap: 8px; font-size: .75em;
}
.pe-label { color: var(--sub); min-width: 48px; }
.pe-track {
  flex: 1; height: 6px; border-radius: 3px; position: relative;
  background: linear-gradient(to right, #0ea371 0%, #0ea371 25%, #facc15 25%, #facc15 60%, #ef4444 60%, #ef4444 100%);
}
.pe-dot {
  position: absolute; top: -4px; width: 14px; height: 14px;
  border-radius: 50%; background: #fff; border: 2.5px solid #1a1d26;
  transform: translateX(-50%); transition: left .4s;
}
.pe-val { font-weight: 700; min-width: 64px; text-align: right; }

/* Returns row */
.rets { display: flex; gap: 6px; flex-wrap: wrap; }
.ret-tag {
  padding: 3px 9px; border-radius: 5px; font-size: .73em; font-weight: 600;
  background: #f1f5f9; color: #475569;
}
.ret-tag.up { background: #d1fae5; color: #065f46; }
.ret-tag.down { background: #fee2e2; color: #991b1b; }

/* Sparkline */
.spark-wrap { height: 70px; position: relative; }
.spark-wrap svg { width: 100%; height: 100%; }

/* Time range tabs */
.time-tabs { display: flex; gap: 4px; margin-bottom: 2px; }
.time-tab {
  padding: 2px 10px; border-radius: 10px; border: 1px solid var(--border);
  background: #fff; font-size: .7em; cursor: pointer; transition: all .12s;
  font-family: inherit; color: var(--sub);
}
.time-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
.time-tab:hover:not(.active) { background: #f1f5f9; }

/* Score bar */
.score-row {
  display: flex; align-items: center; gap: 8px; font-size: .75em;
  border-top: 1px solid var(--border); padding-top: 10px;
}
.score-label { color: var(--sub); white-space: nowrap; }
.score-bar-wrap { flex: 1; height: 5px; border-radius: 3px; background: #e5e7eb; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; transition: width .5s, background .5s; }
.score-num { font-weight: 700; min-width: 28px; text-align: right; }
.score-breakdown { font-size: .7em; color: var(--sub); }

/* Loading / empty */
.loading { text-align: center; padding: 50px; color: var(--sub); font-size: .95em; }

/* Footer */
.footer {
  text-align: center; padding: 20px; font-size: .72em; color: var(--sub);
  border-top: 1px solid var(--border); margin-top: 20px;
}

/* Add fund */
.add-row {
  margin-bottom: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.add-row input {
  padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
  font-size: .85em; outline: none; width: 260px; font-family: inherit;
}
.add-row input:focus { border-color: var(--blue); }
.add-row button {
  padding: 8px 16px; border-radius: 8px; border: none; font-size: .85em;
  cursor: pointer; font-weight: 600; transition: opacity .15s; font-family: inherit;
}
.btn-add { background: var(--blue); color: #fff; }
.btn-outline { background: #fff; color: var(--blue); border: 1px solid var(--blue); }
.add-row button:hover { opacity: .8; }

/* Delete button */
.card-del {
  width: 24px; height: 24px; border-radius: 50%; border: none;
  background: transparent; color: #94a3b8; cursor: pointer;
  font-size: 1.1em; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0; line-height: 1;
}
.card-del:hover { background: #fee2e2; color: #e5484d; }

/* ── Portfolio section ── */
.portfolio {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 16px 20px; margin-bottom: 14px;
}
.port-header {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap; margin-bottom: 12px;
}
.port-header .port-title { font-weight: 700; font-size: .9em; }
.port-header .port-actions { display: flex; gap: 6px; }
.port-btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: #fff; font-size: .73em; cursor: pointer; transition: all .12s;
  font-family: inherit; color: var(--text);
}
.port-btn:hover { background: #f1f5f9; }
.port-btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.port-btn.primary:hover { opacity: .85; }
.port-summary {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px;
}
.port-stat { text-align: center; padding: 10px 6px; background: #f8f9fb; border-radius: 8px; }
.port-stat .ps-label { font-size: .68em; color: var(--sub); }
.port-stat .ps-value { font-size: 1.05em; font-weight: 700; margin-top: 2px; }
.port-stat .ps-sub { font-size: .7em; margin-top: 1px; }
.port-cats { display: flex; gap: 0; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.port-cat-seg { height: 100%; transition: width .3s; }
.port-cat-legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: .7em; color: var(--sub); }
.port-cat-legend span { display: flex; align-items: center; gap: 4px; }
.port-cat-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
.port-table { width: 100%; border-collapse: collapse; font-size: .76em; margin-top: 8px; }
.port-table th { text-align: left; padding: 6px 8px; color: var(--sub); font-weight: 500; border-bottom: 1px solid var(--border); }
.port-table td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; }
.port-table .pnl-up { color: var(--red); font-weight: 600; }
.port-table .pnl-down { color: var(--green); font-weight: 600; }
.port-table .del-btn {
  background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1em;
}
.port-table .del-btn:hover { color: var(--red); }
.port-edit-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
.port-edit-row input, .port-edit-row select {
  padding: 5px 8px; border: 1px solid var(--border); border-radius: 5px;
  font-size: .75em; font-family: inherit; outline: none;
}
.port-edit-row input:focus, .port-edit-row select:focus { border-color: var(--blue); }
.port-edit-row input { width: 80px; }
.port-edit-row input.wide { width: 110px; }
.port-files { font-size: .72em; color: var(--sub); margin-top: 6px; }
.port-files a { color: var(--blue); }

/* ── Donut charts ── */
.charts-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 12px 0;
}
@media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
.chart-box {
  background: #f8f9fb; border-radius: var(--radius); padding: 12px;
  display: flex; flex-direction: column; align-items: center;
}
.chart-box .chart-title {
  font-size: .78em; font-weight: 700; color: var(--text); margin-bottom: 4px;
}
.chart-box .chart-sub {
  font-size: .68em; color: var(--sub); margin-bottom: 8px;
}
.chart-box canvas { max-height: 220px; }

/* Invest category badges */
.badge-core { background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 10px; font-size: .7em; font-weight: 700; }
.badge-sat { background: #ffedd5; color: #9a3412; padding: 2px 8px; border-radius: 10px; font-size: .7em; font-weight: 700; }
.badge-def { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 10px; font-size: .7em; font-weight: 700; }

/* Invest category breakdown bar */
.invest-bar-wrap { margin: 10px 0; }
.invest-bar-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: .75em;
}
.invest-bar-label { min-width: 56px; font-weight: 700; white-space: nowrap; }
.invest-bar-track { flex: 1; height: 20px; border-radius: 4px; background: #e5e7eb; overflow: hidden; position: relative; }
.invest-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; display: flex; align-items: center; padding-left: 8px; font-size: .75em; font-weight: 700; color: #fff; }
.invest-bar-val { min-width: 100px; text-align: right; font-weight: 600; white-space: nowrap; }

/* PE badges */
.pe-badge { padding: 2px 6px; border-radius: 4px; font-size: .72em; font-weight: 700; white-space: nowrap; }
.pe-low { background: #d1fae5; color: #065f46; }
.pe-fair { background: #fef3c7; color: #92400e; }
.pe-high { background: #fee2e2; color: #991b1b; }
.pe-na { background: #f1f5f9; color: #64748b; }
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <span class="topbar-brand"><span class="topbar-dot"></span>基金投资仪表盘</span>
  <span class="topbar-time" id="updateTime">加载中…</span>
  <button class="topbar-refresh" onclick="refreshAll()">⟳ 刷新数据</button>
</div>

<!-- ── Market indicators ── -->
<div class="market-strip" id="marketStrip">
  <div class="market-item"><span class="mi-label">VIX</span><span class="mi-value" id="mvix">17.1</span><span class="mi-sub" style="font-size:.68em;color:var(--sub);margin-left:2px">5/1</span></div>
  <div class="market-item"><span class="mi-label">恐慌贪婪</span><span class="mi-value" id="mfng">66</span><span class="mi-tag greed" id="mfngTag">贪婪</span></div>
  <div class="market-item"><span class="mi-label">标普CAPE</span><span class="mi-value" id="mcape">38.5</span></div>
  <div class="market-item"><span class="mi-label">纳指PE</span><span class="mi-value" id="mnas">33.8</span><span class="mi-sub" style="font-size:.68em;color:var(--sub);margin-left:2px">85%分位</span></div>
  <div class="market-item"><span class="mi-label">A500 PE</span><span class="mi-value" id="ma500">17.8</span><span class="mi-sub" style="font-size:.68em;color:var(--sub);margin-left:2px">78%分位</span></div>
  <div class="market-item"><span class="mi-label">红利低波PE</span><span class="mi-value" id="mdiv">8.5</span><span class="mi-sub" style="font-size:.68em;color:var(--sub);margin-left:2px">78%分位</span></div>
  <div class="market-item"><span class="mi-label">自由现金流PE</span><span class="mi-value" id="mfcfe">16.1</span><span class="mi-sub" style="font-size:.68em;color:var(--sub);margin-left:2px">65%分位</span></div>
</div>

<!-- ── Main content ── -->
<div class="container">
  <!-- ── Portfolio stats ── -->
  <div class="portfolio" id="portfolio">
    <div class="port-header">
      <span class="port-title">投资组合总览</span>
      <span style="font-size:.7em;color:var(--sub)" id="portUpdated"></span>
      <div class="port-actions">
        <span id="serverStatus" style="font-size:.68em;color:var(--sub);margin-right:4px"></span>
        <button class="port-btn primary" onclick="ocrScan()" title="从截图文件夹自动识别持仓">📷 识别截图</button>
        <button class="port-btn" onclick="togglePortEdit()">＋ 录入持仓</button>
        <button class="port-btn" onclick="refreshPortfolio()">⟳ 刷新</button>
      </div>
    </div>

    <div class="port-summary" id="portSummary"></div>

    <!-- Donut charts: platform + investCategory -->
    <div class="charts-row">
      <div class="chart-box">
        <div class="chart-title">平台分布</div>
        <div class="chart-sub" id="chartPlatformSub"></div>
        <canvas id="chartPlatform"></canvas>
      </div>
      <div class="chart-box">
        <div class="chart-title">仓位结构</div>
        <div class="chart-sub" id="chartInvestSub"></div>
        <canvas id="chartInvest"></canvas>
      </div>
    </div>

    <!-- Invest category breakdown bar -->
    <div class="invest-bar-wrap" id="investBarWrap"></div>

    <div class="port-cats" id="portCats"></div>
    <div class="port-cat-legend" id="portLegend"></div>
    <div id="portPlatforms"></div>

    <table class="port-table" id="portTable"><tbody></tbody></table>

    <div id="portEdit" style="display:none">
      <div class="port-edit-row">
        <select id="pePlatform"><option>支付宝</option><option>京东金融</option><option>同花顺</option><option>其他</option></select>
        <input class="wide" id="peFund" placeholder="基金/品种名称">
        <input id="peCode" placeholder="代码(选填)">
        <select id="peCat"><option>美股QDII</option><option>A股指数</option><option>A股红利</option><option>行业主题</option><option>债券固收</option><option>现金/货基</option><option>其他</option></select>
        <select id="peInvest"><option>核心底仓</option><option>卫星仓位</option><option>防御对冲</option></select>
        <input id="peValue" placeholder="持仓市值">
        <input id="peCost" placeholder="成本(选填)">
        <button class="port-btn primary" onclick="addHolding()">保存</button>
        <button class="port-btn" onclick="togglePortEdit()">取消</button>
      </div>
    </div>

    <div class="port-files" id="portFiles"></div>
  </div>

  <div class="add-row">
    <span style="font-size:.82em;color:var(--sub);white-space:nowrap">自定义基金</span>
    <input type="text" id="fundInput" placeholder="输入6位基金代码，逗号分隔">
    <button class="btn-add" onclick="addFunds()">＋ 添加</button>
    <span style="font-size:.73em;color:var(--sub);margin-left:auto" id="cacheHint"></span>
  </div>
  <div id="fundList"></div>
  <div class="loading" id="loadingMsg">加载中...</div>
</div>

<div class="footer">
  数据来源：天天基金 / 东方财富 / CNN / CBOE ｜ 仅供参考，不构成投资建议。投资有风险，入市需谨慎。
</div>

<script>
// ======================== Market data ========================
const MARKET = {
  vix: 16.93, vixDate: '2026-05-06',
  fng: 67, fngLabel: '贪婪', fngDate: '2026-05-06',
  cape: 41.24, // S&P 500 Shiller CAPE
  nasPE: 33.8, nasPct: 85,
  a500PE: 17.8, a500Pct: 78,
  divPE: 8.5, divPct: 78,
  fcfePE: 16.1, fcfePct: 65  // 国证自由现金流
};

function getFundPE(code, fundName) {
  // 1. Exact code match
  const codeMap = {
    '018043': { pe: MARKET.nasPE, pct: MARKET.nasPct, label: '纳指100' },
    '016452': { pe: MARKET.nasPE, pct: MARKET.nasPct, label: '纳指100' },
    '017641': { pe: 24.6, pct: 92, label: '标普500' },
    '050025': { pe: 24.6, pct: 92, label: '标普500' },
    '022459': { pe: MARKET.a500PE, pct: MARKET.a500Pct, label: '中证A500' },
    '023917': { pe: MARKET.fcfePE, pct: MARKET.fcfePct, label: '自由现金流' },
    '011452': { pe: 22.5, pct: 55, label: '质量成长' },
    '012922': { pe: MARKET.nasPE, pct: MARKET.nasPct, label: '全球成长' },
    '016665': { pe: 28.5, pct: 62, label: '全球高端制造' },
    '016708': { pe: 18.5, pct: 42, label: '有色金属' },
    '020640': { pe: 58.3, pct: 45, label: '芯片产业' },
    '024239': { pe: 32.5, pct: 52, label: '科技龙头' },
    '025209': { pe: 58.3, pct: 45, label: '芯片产业' },
    '020274': { pe: 22.8, pct: 25, label: '细分化工' },
    '021363': { pe: null, pct: null, label: '黄金产业(无PE)' },
    '016874': { pe: 14.5, pct: 52, label: '混合基金' },
    '675093': { pe: null, pct: null, label: '债券(无PE)' }
  };
  if (codeMap[code]) return codeMap[code];

  // 2. Keyword match from fund name
  const n = (fundName || code || '').toUpperCase();
  const kw = [
    // US & global
    { keys: ['纳斯达克','纳指','NASDAQ','NDX'], pe: MARKET.nasPE, pct: MARKET.nasPct, label: '纳指100' },
    { keys: ['标普','标准普尔','S&P','SP500','S&P500','普尔'], pe: 24.6, pct: 92, label: '标普500' },
    { keys: ['道琼斯','道指','DJIA'], pe: 22.1, pct: 80, label: '道琼斯' },
    { keys: ['罗素','RUSSELL','RUT'], pe: 29.5, pct: 75, label: '罗素2000' },
    // A-share broad
    { keys: ['A500','中证A50'], pe: MARKET.a500PE, pct: MARKET.a500Pct, label: '中证A500' },
    { keys: ['沪深300','HS300','300ETF'], pe: 13.5, pct: 55, label: '沪深300' },
    { keys: ['中证500','ZZ500','500ETF'], pe: 22.3, pct: 48, label: '中证500' },
    { keys: ['中证800','ZZ800'], pe: 14.5, pct: 52, label: '中证800' },
    { keys: ['中证1000','ZZ1000','1000ETF'], pe: 28.7, pct: 45, label: '中证1000' },
    { keys: ['中证2000','ZZ2000','2000ETF'], pe: 45.2, pct: 55, label: '中证2000' },
    { keys: ['上证50','SZ50','上证50ETF'], pe: 11.0, pct: 58, label: '上证50' },
    { keys: ['上证180','SZ180'], pe: 12.1, pct: 55, label: '上证180' },
    { keys: ['深证100','SZ100'], pe: 21.5, pct: 52, label: '深证100' },

// ======================== Calculations ========================
function calcReturns(history) {
  if (!history || history.length < 5) return {};
  const last = history[history.length - 1].nav;
  return {
    '1周': retAt(history, last, 5),
    '1月': retAt(history, last, 22),
    '3月': retAt(history, last, 66),
    '6月': retAt(history, last, 132),
    '1年': retAt(history, last, 264)
  };
}
function retAt(h, last, n) {
  const i = Math.max(0, h.length - 1 - n);
  return h[i].nav > 0 ? ((last - h[i].nav) / h[i].nav * 100) : null;
}

function calcMaxDrawdown(history) {
  if (!history || history.length < 2) return null;
  let peak = history[0].nav, maxDd = 0;
  for (const h of history) {
    if (h.nav > peak) peak = h.nav;
    const dd = (peak - h.nav) / peak * 100;
    if (dd > maxDd) maxDd = dd;
  }
  return maxDd;
}

function calcDeviation(history) {
  if (!history || history.length < 60) return null;
  const last = history[history.length - 1].nav;
  const sum = history.slice(-60).reduce((a, b) => a + b.nav, 0);
  return ((last - sum / 60) / (sum / 60) * 100);
}

// ======================== Scoring ========================
function calcScore(fund) {
  let score = 50;
  const reasons = [];

  // --- Fund factors (±30) ---
  const peInfo = getFundPE(fund.code, fund.name);
  if (peInfo && peInfo.pct != null) {
    if (peInfo.pct < 20) { score += 15; reasons.push('PE极度低估'); }
    else if (peInfo.pct < 35) { score += 10; reasons.push('PE较低'); }
    else if (peInfo.pct < 50) { score += 4; reasons.push('PE合理'); }
    else if (peInfo.pct < 70) { score -= 4; reasons.push('PE偏高'); }
    else if (peInfo.pct < 85) { score -= 10; reasons.push('PE高估'); }
    else { score -= 15; reasons.push('PE极度高估'); }
  }

  const r1m = fund.returns?.['1月'];
  const r3m = fund.returns?.['3月'];
  if (r1m != null) {
    if (r1m > 5) { score += 6; reasons.push('近1月强势'); }
    else if (r1m > 0) { score += 3; reasons.push('近1月上扬'); }
    else if (r1m < -8) { score -= 8; reasons.push('近1月急跌'); }
    else if (r1m < -3) { score -= 4; reasons.push('近1月走弱'); }
  }
  if (r3m != null) {
    if (r3m > 15) { score += 5; reasons.push('近3月强势'); }
    else if (r3m < -15) { score -= 6; reasons.push('近3月弱势'); }
  }

  const dev = fund.deviation;
  if (dev != null) {
    if (dev < -10) { score += 6; reasons.push('严重低于MA60'); }
    else if (dev < -5) { score += 3; reasons.push('低于MA60'); }
    else if (dev > 15) { score -= 7; reasons.push('严重高于MA60'); }
    else if (dev > 8) { score -= 3; reasons.push('高于MA60'); }
  }

  const dd = fund.maxDd;
  if (dd != null) {
    if (dd > 35) score -= 5;
    else if (dd > 25) score -= 2;
    else if (dd < 10) score += 3;
  }

  // --- Market overlay (±20) ---
  const vix = MARKET.vix;
  if (vix > 30) { score += 8; reasons.push('VIX极度恐慌'); }
  else if (vix > 25) { score += 5; reasons.push('VIX偏高=机会'); }
  else if (vix > 20) { score += 2; }
  else if (vix < 12) { score -= 4; reasons.push('VIX极低=自满'); }

  const fng = MARKET.fng;
  if (fng < 25) { score += 8; reasons.push('极度恐慌=机会'); }
  else if (fng < 40) { score += 4; reasons.push('市场恐惧'); }
  else if (fng > 80) { score -= 7; reasons.push('极度贪婪=风险'); }
  else if (fng > 60) { score -= 3; reasons.push('市场贪婪'); }

  if (MARKET.cape > 35) { score -= 7; reasons.push('标普CAPE极端'); }
  else if (MARKET.cape > 28) { score -= 3; reasons.push('标普CAPE偏高'); }

  // Clamp and signal
  score = Math.max(5, Math.min(98, Math.round(score)));
  let signal, cls;
  if (score >= 65) { signal = '买入建议'; cls = 'buy'; }
  else if (score >= 40) { signal = '观望/定投'; cls = 'watch'; }
  else { signal = '谨慎/回避'; cls = 'sell'; }

  return { score, signal, cls, reasons: reasons.slice(0, 4) };
}

// ======================== Sparkline ========================
const timeRanges = { '1月': 22, '3月': 66, '6月': 132, '1年': 264, '全部': 0 };
const currentRange = {};

function filterHistory(history, range) {
  if (!history || !history.length) return [];
  const days = timeRanges[range] || 132;
  if (!days) return history;
  return history.slice(Math.max(0, history.length - days));
}

function drawSparkline(code, history, range) {
  range = range || currentRange[code] || '6月';
  currentRange[code] = range;
  const wrap = document.getElementById('spark-' + code);
  if (!wrap || !history || history.length < 5) return;
  const filtered = filterHistory(history, range);
  if (filtered.length < 2) return;

  const w = 300, h = 70, pad = 4, topPad = 10;

  // Calculate MA60 and std for bands (use full history if available)
  const calcWindow = history.length >= 60 ? history.slice(-60) : history;
  const ma60 = calcWindow.reduce((a, b) => a + b.nav, 0) / calcWindow.length;
  const variance = calcWindow.reduce((a, b) => a + (b.nav - ma60) ** 2, 0) / calcWindow.length;
  const std = Math.sqrt(variance);
  const upper = ma60 + 2 * std;
  const lower = ma60 - 2 * std;

  // Extend data range to include bands
  const allVals = [...filtered.map(d => d.nav), upper, lower];
  const dataMin = Math.min(...allVals);
  const dataMax = Math.max(...allVals);
  const yRange = dataMax - dataMin || 1;

  const toY = v => h - pad - ((v - dataMin) / yRange) * (h - pad - topPad);

  const points = filtered.map((d, i) => {
    const x = pad + (i / (filtered.length - 1)) * (w - pad * 2);
    return `${x.toFixed(1)},${toY(d.nav).toFixed(1)}`;
  }).join(' ');

  const trend = filtered[filtered.length - 1].nav >= filtered[0].nav ? '#0ea371' : '#e5484d';
  const gradId = 'grad-' + code;

  const upperY = toY(upper).toFixed(1);
  const lowerY = toY(lower).toFixed(1);

  wrap.innerHTML = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:70px">
    <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${trend}" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="${trend}" stop-opacity="0"/>
    </linearGradient></defs>
    <!-- Upper band (估值高位) -->
    <line x1="${pad}" y1="${upperY}" x2="${w-pad}" y2="${upperY}"
      stroke="#e5484d" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="${w-pad}" y="${parseFloat(upperY)-3}" fill="#e5484d" font-size="7" text-anchor="end" opacity="0.8">高位 ${upper.toFixed(3)}</text>
    <!-- Lower band (估值低位) -->
    <line x1="${pad}" y1="${lowerY}" x2="${w-pad}" y2="${lowerY}"
      stroke="#0ea371" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="${w-pad}" y="${parseFloat(lowerY)-3}" fill="#0ea371" font-size="7" text-anchor="end" opacity="0.8">低位 ${lower.toFixed(3)}</text>
    <!-- Area fill -->
    <polygon points="${pad},${h-pad} ${points} ${w-pad},${h-pad}"
      fill="url(#${gradId})" stroke="none"/>
    <!-- NAV line -->
    <polyline points="${points}" fill="none" stroke="${trend}" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
}


function switchRange(code, range) {
  const fund = cache[code];
  if (!fund || !fund.history) return;
  const tabs = document.getElementById('tabs-' + code);
  if (tabs) {
    tabs.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
    const target = Array.from(tabs.querySelectorAll('.time-tab'))
      .find(t => t.textContent === range);
    if (target) target.classList.add('active');
  }
  drawSparkline(code, fund.history, range);
}

const cache = {};
const DEFAULT_FUNDS = ['040046', '050025', '022459', '007466', '023917'];
const KEY = 'fund_codes_v4';

function getCodes() {
  const data = getPortfolio();
  // Only OTC mutual fund codes (0xxxxx) can be loaded from 天天基金 API
  const portfolioCodes = [...new Set((data.holdings||[])
    .map(x => x.code)
    .filter(c => c && /^0\d{5}$/.test(c)))];

  if (portfolioCodes.length > 0) {
    // Portfolio is the sole source of truth — clear stale localStorage
    saveCodes(portfolioCodes);
    return portfolioCodes;
  }
  // No portfolio data: fall back to saved custom codes
  try {
    const v = localStorage.getItem(KEY);
    return v ? JSON.parse(v) : [];
  } catch { return []; }
}
function saveCodes(codes) { localStorage.setItem(KEY, JSON.stringify(codes)); }

async function loadFund(code) {
  let est = null;
  try { est = await fetchEstimate(code); } catch (e) { /* */ }

  let historyData = [], s1n = null, s6y = null;
  const portfolioName = getPortfolioName(code);
  try {
    const result = await fetchHistory(code);
    historyData = result.data || [];
    s1n = result.s1n != null ? parseFloat(result.s1n) : null;
    s6y = result.s6y != null ? parseFloat(result.s6y) : null;
  } catch (e) { /* */ }
  // Portfolio name is authoritative — API names may differ from actual holdings
  const name = portfolioName || est?.name || '';

  const fund = {
    code, name,
    dwjz: est?.dwjz || null,
    gsz: est?.gsz || null,
    changePct: est?.gszzl ? parseFloat(est.gszzl) : null,
    estTime: est?.gztime || null,
    jzrq: est?.jzrq || null,
    returns: calcReturns(historyData),
    maxDd: calcMaxDrawdown(historyData),
    deviation: calcDeviation(historyData),
    s1n, s6y,
    history: historyData
  };
  cache[code] = fund;
  return fund;
}

    '<div class="fund-grid">' + funds.map(renderCard).join('') + '</div>';
  document.getElementById('loadingMsg').style.display = 'none';
  funds.forEach(f => {
    if (f.history?.length >= 5) drawSparkline(f.code, f.history);
  });
}

function renderMarket() {
  document.getElementById('mvix').textContent = MARKET.vix.toFixed(1);
  document.getElementById('mfng').textContent = MARKET.fng;
  const tag = document.getElementById('mfngTag');
  tag.textContent = MARKET.fngLabel;
  tag.className = 'mi-tag ' + (MARKET.fng > 60 ? 'greed' : MARKET.fng < 40 ? 'fear' : 'neutral');
}

async function refreshAll() {
  const codes = getCodes();
  if (!codes.length) {
    document.getElementById('loadingMsg').innerHTML = '请添加基金代码';
    return;
  }
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('loadingMsg').innerHTML = '加载中...';
  renderMarket();

  // Create placeholder cards immediately so user sees layout
  const placeholders = codes.map(c => ({ code: c, name: '加载中...', history: [] }));
  renderAll(placeholders);

  // Incremental loading — each fund renders as it arrives
  const funds = [];
  for (let i = 0; i < codes.length; i++) {
    document.getElementById('loadingMsg').innerHTML =
      `加载中 ${codes[i]} (${i + 1}/${codes.length})...`;
    const fund = await loadFundWithTimeout(codes[i]);
    funds.push(fund);
    // Incremental render
    const merged = codes.map(c => {
      const loaded = funds.find(f => f.code === c);
      return loaded || { code: c, name: c, history: [] };
    });
    renderAll(merged);
  }

  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('updateTime').textContent =
    '更新 ' + new Date().toLocaleString('zh-CN');
  document.getElementById('cacheHint').textContent =
    '已保存: ' + codes.join(', ');
}

function loadFundWithTimeout(code) {
  return new Promise((resolve) => {
    const timer = setTimeout(() => {
      resolve({ code, name: code + ' 超时', history: [], dwjz: null, gsz: null,
        changePct: null, jzrq: null, returns: {}, maxDd: null, deviation: null });
    }, 10000);
    loadFund(code).then(f => { clearTimeout(timer); resolve(f); });
  });
}

async function addFunds() {
  const raw = document.getElementById('fundInput').value.trim();
  if (!raw) return;
  const newCodes = raw.split(/[,，\s]+/).filter(c => /^\d{6}$/.test(c));
  if (!newCodes.length) { alert('请输入6位数字基金代码'); return; }
  const portfolioCodes = [...new Set((getPortfolio().holdings||[]).map(x => x.code).filter(c => c && /^\d{6}$/.test(c)))];
  saveCodes([...new Set([...portfolioCodes, ...newCodes])]);
  document.getElementById('fundInput').value = '';
  await refreshAll();
}

async function removeFund(code) {
  const codes = getCodes().filter(c => c !== code);
  if (!codes.length) { alert('至少保留一只基金'); return; }
  saveCodes(codes);
  delete cache[code];
  // Re-render without full reload
  const remaining = codes.map(c => cache[c] || { code, name: '', history: [] });
  if (remaining.every(f => f.history && f.history.length >= 0)) {
    // If all funds are cached, just re-render
    const funds = codes.map(c => cache[c]).filter(Boolean);
    if (funds.length === codes.length) {
      renderAll(funds);
      document.getElementById('updateTime').textContent =
        '更新 ' + new Date().toLocaleString('zh-CN');
      document.getElementById('cacheHint').textContent = '已保存: ' + codes.join(', ');
      return;
    }
  }
  await refreshAll();
}

async function tryFetchVIX() {
  try {
    const r = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=5d');
    if (!r.ok) throw new Error('err');
    const j = await r.json();
    const q = j?.chart?.result?.[0];
    if (q) {
      const closes = q.indicators?.quote?.[0]?.close?.filter(v => v != null) || [];
      if (closes.length) {
        MARKET.vix = closes[closes.length - 1];
        const ts = q.timestamp?.[closes.length - 1];
        if (ts) MARKET.vixDate = new Date(ts * 1000).toISOString().slice(0, 10);
        renderMarket();
      }
    }
  } catch (e) { /* keep hardcoded value */ }
}

async function tryFetchFNG() {
  try {
    const r = await fetch('https://production.dataviz.cnn.io/index/fearandgreed/graphdata');
    if (!r.ok) throw new Error('err');
    const j = await r.json();
    if (j?.fear_and_greed) {
      MARKET.fng = parseFloat(j.fear_and_greed.now.value);
      MARKET.fngLabel = j.fear_and_greed.now.description || '';
      MARKET.fngDate = new Date().toISOString().slice(0, 10);
      renderMarket();
    }
  } catch (e) { /* keep hardcoded value */ }
}

// ======================== Portfolio ========================
const PORT_KEY = 'portfolio_data_v1';
const SERVER_URL = 'http://localhost:3001';
let serverAvailable = false;
const CAT_COLORS = {
  '美股QDII': '#3b6df0', 'A股指数': '#0ea371', 'A股红利': '#ea580c',
  '行业主题': '#8b5cf6', '债券固收': '#f59e0b', '现金/货基': '#94a3b8',
  '其他': '#64748b'
};
const INVEST_COLORS = { '核心底仓': '#3b6df0', '卫星仓位': '#ea580c', '防御对冲': '#f59e0b' };
const INVEST_FILL = { '核心底仓': '#dbeafe', '卫星仓位': '#ffedd5', '防御对冲': '#fef3c7' };
let chartPlatformInst = null, chartInvestInst = null;

function getPortfolio() {
  try {
    const v = localStorage.getItem(PORT_KEY);
    return v ? JSON.parse(v) : { holdings: [], updated: '' };
  } catch { return { holdings: [], updated: '' }; }
}

// Look up a fund's correct name from portfolio data by code
function getPortfolioName(code) {
  const data = getPortfolio();
  const h = data.holdings.find(x => x.code === code);
  return h ? h.fund : null;
}

function savePortfolio(data) {
  localStorage.setItem(PORT_KEY, JSON.stringify(data));
}

function fmtVal(v) { return '¥' + Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtPnl(pnl, cost) {
  if (!cost || cost === 0) return '--';
  const pct = (pnl / cost * 100);
  return (pnl >= 0 ? '+' : '') + '¥' + Math.abs(pnl).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' (' + (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%)';
}

function renderDonutCharts(h, totalVal) {
  const ctxP = document.getElementById('chartPlatform');
  const ctxI = document.getElementById('chartInvest');
  if (!ctxP || !ctxI) return;

  // Destroy existing charts
  if (chartPlatformInst) chartPlatformInst.destroy();
  if (chartInvestInst) chartInvestInst.destroy();

  // Platform aggregation
  const platforms = {};
  h.forEach(x => {
    const p = x.platform || '未知';
    platforms[p] = (platforms[p] || 0) + (parseFloat(x.value) || 0);
  });
  const platEntries = Object.entries(platforms).sort((a, b) => b[1] - a[1]);
  const platColors = ['#3b6df0', '#0ea371', '#ea580c', '#8b5cf6', '#f59e0b', '#94a3b8'];

  // Invest category aggregation
  const invests = {};
  h.forEach(x => {
    const ic = x.investCategory || '卫星仓位';
    invests[ic] = (invests[ic] || 0) + (parseFloat(x.value) || 0);
  });
  const investOrder = ['核心底仓', '卫星仓位', '防御对冲'];
  const investEntries = investOrder.filter(k => invests[k]).map(k => [k, invests[k]]);
  // Add any unexpected categories
  Object.entries(invests).forEach(([k, v]) => { if (!investOrder.includes(k)) investEntries.push([k, v]); });

  document.getElementById('chartPlatformSub').textContent =
    platEntries.map(([n, v]) => n + ' ' + fmtVal(v)).join('  ·  ');
  document.getElementById('chartInvestSub').textContent =
    investEntries.map(([n, v]) => n + ' ' + fmtVal(v) + ' (' + (v / totalVal * 100).toFixed(1) + '%)').join('  ·  ');

  chartPlatformInst = new Chart(ctxP, {
    type: 'doughnut',
    data: {
      labels: platEntries.map(([n]) => n),
      datasets: [{
        data: platEntries.map(([, v]) => v),
        backgroundColor: platColors.slice(0, platEntries.length),
        borderColor: '#fff', borderWidth: 2,
        hoverBorderColor: '#fff', hoverBorderWidth: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, pointStyleWidth: 8, font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.label + ': ' + fmtVal(ctx.raw) + ' (' + (ctx.raw / totalVal * 100).toFixed(1) + '%)' } }
      }
    }
  });

  chartInvestInst = new Chart(ctxI, {
    type: 'doughnut',
    data: {
      labels: investEntries.map(([n]) => n),
      datasets: [{
        data: investEntries.map(([, v]) => v),
        backgroundColor: investEntries.map(([n]) => INVEST_COLORS[n] || '#94a3b8'),
        borderColor: '#fff', borderWidth: 2,
        hoverBorderColor: '#fff', hoverBorderWidth: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, pointStyleWidth: 8, font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.label + ': ' + fmtVal(ctx.raw) + ' (' + (ctx.raw / totalVal * 100).toFixed(1) + '%)' } }
      }
    }
  });
}

function renderInvestBars(h, totalVal) {
  const wrap = document.getElementById('investBarWrap');
  if (!wrap) return;
  const invests = {};
  h.forEach(x => {
    const ic = x.investCategory || '卫星仓位';
    invests[ic] = (invests[ic] || 0) + (parseFloat(x.value) || 0);
  });
  const order = ['核心底仓', '卫星仓位', '防御对冲'];
  const entries = order.filter(k => invests[k]).map(k => [k, invests[k]]);
  Object.entries(invests).forEach(([k, v]) => { if (!order.includes(k)) entries.push([k, v]); });

  wrap.innerHTML = entries.map(([name, val]) => {
    const pct = (val / totalVal * 100);
    const color = INVEST_COLORS[name] || '#94a3b8';
    const bg = INVEST_FILL[name] || '#f1f5f9';
    return `<div class="invest-bar-row">
      <span class="invest-bar-label" style="color:${color}">${name}</span>
      <div class="invest-bar-track">
        <div class="invest-bar-fill" style="width:${pct}%;background:${color}">${pct.toFixed(1)}%</div>
      </div>
      <span class="invest-bar-val">${fmtVal(val)}</span>
      <span style="font-size:.7em;color:var(--sub);min-width:40px;text-align:right">${entries.filter(e => e[0] === name).length ? h.filter(x => (x.investCategory||'卫星仓位') === name).length + '笔' : ''}</span>
    </div>`;
  }).join('');
}

function renderPEBadge(code, fundName) {
  const peInfo = getFundPE(code, fundName);
  if (!peInfo || peInfo.pct == null) {
    return '<span class="pe-badge pe-na">--</span>';
  }
  const pct = peInfo.pct;
  let cls, label;
  if (pct < 25) { cls = 'pe-low'; label = '低估'; }
  else if (pct < 50) { cls = 'pe-low'; label = '偏低'; }
  else if (pct < 70) { cls = 'pe-fair'; label = '合理'; }
  else if (pct < 85) { cls = 'pe-high'; label = '偏高'; }
  else { cls = 'pe-high'; label = '高估'; }
  return `<span class="pe-badge ${cls}" title="${peInfo.label || ''} PE=${peInfo.pe!=null?peInfo.pe.toFixed(1):'--'} 分位${pct}%">${label} ${pct}%</span>`;
}

function renderPortfolio() {
  const data = getPortfolio();
  const h = data.holdings || [];

  // Summary
  const totalVal = h.reduce((s, x) => s + (parseFloat(x.value) || 0), 0);
  const totalCost = h.reduce((s, x) => s + (parseFloat(x.cost) || 0), 0);
  const totalPnL = totalVal - totalCost;
  const pnlPct = totalCost > 0 ? (totalPnL / totalCost * 100) : 0;

  document.getElementById('portSummary').innerHTML = `
    <div class="port-stat">
      <div class="ps-label">总市值</div>
      <div class="ps-value">${fmtVal(totalVal)}</div>
    </div>
    <div class="port-stat">
      <div class="ps-label">总成本</div>
      <div class="ps-value">${fmtVal(totalCost)}</div>
    </div>
    <div class="port-stat">
      <div class="ps-label">累计盈亏</div>
      <div class="ps-value" style="color:${totalPnL>=0?'var(--red)':'var(--green)'}">${totalPnL>=0?'+':''}${fmtVal(totalPnL)}</div>
      <div class="ps-sub" style="color:${pnlPct>=0?'var(--red)':'var(--green)'}">${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</div>
    </div>
    <div class="port-stat">
      <div class="ps-label">持仓数量</div>
      <div class="ps-value">${h.length} 笔</div>
      <div class="ps-sub">${new Set(h.map(x=>x.platform)).size} 个平台</div>
    </div>`;

  // Donut charts
  if (totalVal > 0) {
    renderDonutCharts(h, totalVal);
    renderInvestBars(h, totalVal);
  }

  // Per-platform summaries
  const platforms = {};
  h.forEach(x => {
    const p = x.platform || '未知';
    if (!platforms[p]) platforms[p] = { val: 0, cost: 0, count: 0, cats: {} };
    platforms[p].val += parseFloat(x.value) || 0;
    platforms[p].cost += parseFloat(x.cost) || 0;
    platforms[p].count++;
    const cat = x.category || '其他';
    platforms[p].cats[cat] = (platforms[p].cats[cat] || 0) + (parseFloat(x.value) || 0);
  });

  let platHTML = '';
  for (const [name, p] of Object.entries(platforms)) {
    const pPnl = p.val - p.cost;
    const pnlColor = pPnl >= 0 ? 'var(--red)' : 'var(--green)';
    const catTags = Object.entries(p.cats).sort((a,b) => b[1] - a[1])
      .map(([cn, cv]) => cn + ' ' + fmtVal(cv)).join(' · ');
    platHTML += '<div style="display:flex;align-items:center;gap:12px;padding:5px 0;font-size:.73em;flex-wrap:wrap;border-bottom:1px solid #eee">' +
      '<span style="font-weight:700;min-width:56px">' + name + '</span>' +
      '<span>市值 <b>' + fmtVal(p.val) + '</b></span>' +
      '<span>成本 <b>' + fmtVal(p.cost) + '</b></span>' +
      '<span>盈亏 <b style="color:' + pnlColor + '">' + fmtPnl(pPnl, p.cost) + '</b></span>' +
      '<span style="color:var(--sub)">' + p.count + '笔</span>' +
      '<span style="color:var(--sub);font-size:.95em">' + catTags + '</span></div>';
  }

  document.getElementById('portPlatforms').innerHTML = platHTML;

  // Category breakdown
  const cats = {};
  h.forEach(x => {
    const cat = x.category || '其他';
    cats[cat] = (cats[cat] || 0) + (parseFloat(x.value) || 0);
  });
  const catEntries = Object.entries(cats).sort((a,b) => b[1] - a[1]);

  document.getElementById('portCats').innerHTML = catEntries.map(([name, val]) => {
    const pct = totalVal > 0 ? (val / totalVal * 100) : 0;
    return `<div class="port-cat-seg" style="width:${pct}%;background:${CAT_COLORS[name]||'#94a3b8'}" title="${name}: ${pct.toFixed(1)}%"></div>`;
  }).join('') || '<div style="color:var(--sub);font-size:.75em">暂无数据</div>';

  document.getElementById('portLegend').innerHTML = catEntries.map(([name, val]) => {
    const pct = totalVal > 0 ? (val / totalVal * 100) : 0;
    const color = CAT_COLORS[name] || '#94a3b8';
    return `<span><span class="port-cat-dot" style="background:${color}"></span>${name} ${pct.toFixed(1)}% (${fmtVal(val)})</span>`;
  }).join('');

  // Holdings table
  document.getElementById('portTable').innerHTML = h.length ? `
    <thead><tr>
      <th>平台</th><th>代码</th><th>基金/品种</th><th>风格</th><th>类别</th><th>PE分位</th><th>市值</th><th>成本</th><th>盈亏</th><th></th>
    </tr></thead>
    <tbody>${h.map((x, i) => {
      const val = parseFloat(x.value) || 0;
      const cost = parseFloat(x.cost) || 0;
      const pnl = val - cost;
      const pnlCls = pnl >= 0 ? 'pnl-up' : 'pnl-down';
      const invest = x.investCategory || '卫星仓位';
      const investBadge = invest === '核心底仓' ? 'badge-core' : invest === '卫星仓位' ? 'badge-sat' : 'badge-def';
      return `<tr>
        <td>${x.platform||''}</td>
        <td style="font-weight:600">${x.code||'--'}</td>
        <td>${x.fund||''}</td>
        <td><span class="${investBadge}">${invest}</span></td>
        <td>${x.category||''}</td>
        <td>${renderPEBadge(x.code, x.fund)}</td>
        <td>${fmtVal(val)}</td>
        <td>${cost>0?fmtVal(cost):'--'}</td>
        <td class="${pnlCls}">${fmtPnl(pnl, cost)}</td>
        <td><button class="del-btn" onclick="removeHolding(${i})" title="删除">×</button></td>
      </tr>`;
    }).join('')}</tbody>` : '<div style="color:var(--sub);font-size:.75em;padding:8px">暂无持仓记录，点击"录入持仓"添加</div>';

  document.getElementById('portUpdated').textContent = data.updated
    ? '更新于 ' + data.updated : '';
}

function togglePortEdit() {
  const el = document.getElementById('portEdit');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  if (el.style.display === 'block') {
    document.getElementById('peFund').focus();
  }
}

function addHolding() {
  const platform = document.getElementById('pePlatform').value;
  const fund = document.getElementById('peFund').value.trim();
  const code = document.getElementById('peCode').value.trim();
  const category = document.getElementById('peCat').value;
  const investCategory = document.getElementById('peInvest').value;
  const value = parseFloat(document.getElementById('peValue').value);
  const cost = parseFloat(document.getElementById('peCost').value) || 0;

  if (!fund) { alert('请输入基金名称'); return; }
  if (!value || value <= 0) { alert('请输入有效持仓市值'); return; }

  const data = getPortfolio();
  data.holdings.push({ platform, fund, code, category, investCategory, value, cost });
  data.updated = new Date().toLocaleString('zh-CN');
  savePortfolio(data);
  renderPortfolio();

  // Clear form
  document.getElementById('peFund').value = '';
  document.getElementById('peCode').value = '';
  document.getElementById('peValue').value = '';
  document.getElementById('peCost').value = '';
  document.getElementById('portEdit').style.display = 'none';
}

function removeHolding(index) {
  const data = getPortfolio();
  data.holdings.splice(index, 1);
  data.updated = new Date().toLocaleString('zh-CN');
  savePortfolio(data);
  renderPortfolio();
}

async function refreshPortfolio() {
  const synced = await syncFromServer(true);
  if (!synced) renderPortfolio();
}

async function ocrScan() {
  const el = document.getElementById('portFiles');
  el.style.display = 'block';
  el.innerHTML = '<span style="color:var(--blue)">📷 正在扫描并识别截图中，约需30秒...</span>';
  try {
    const r = await fetch(SERVER_URL + '/api/ocr-scan', { method: 'POST' });
    const data = await r.json();
    if (data.ok && data.holdings && data.holdings.length > 0) {
      serverAvailable = true;
      const platforms = {};
      data.holdings.forEach(h => { platforms[h.platform] = (platforms[h.platform] || 0) + 1; });
      const platStr = Object.entries(platforms).map(([k, v]) => k + ': ' + v + '笔').join(', ');
      el.innerHTML = '<span style="color:var(--green)">✅ 识别完成：共 ' + data.total + ' 笔持仓 (' + platStr + ')</span>';
      savePortfolio({ holdings: data.holdings, updated: new Date().toLocaleString('zh-CN') });
      renderPortfolio();
      syncPortfolioCodes();
    } else {
      el.innerHTML = '<span style="color:var(--red)">识别失败: ' + (data.error || '未提取到持仓数据') + '</span><br>' +
        '<span style="opacity:.7">请确认截图文件夹中有包含持仓页面的截图</span>';
    }
  } catch (e) {
    el.innerHTML = '<span style="color:var(--amber)">连接服务器失败</span> · ' +
      '请在 fund-dashboard 目录运行 <code style="background:#f1f5f9;padding:1px 4px;border-radius:3px">node server.js</code><br>' +
      '<span style="opacity:.7">或使用"录入持仓"手动添加</span>';
  }
}

async function syncFromServer(forceScan) {
  try {
    if (forceScan) {
      // Run OCR re-scan for latest data
      const r = await fetch(SERVER_URL + '/api/ocr-scan', { method: 'POST' });
      if (r.ok) {
        serverAvailable = true;
        const data = await r.json();
        if (data.ok && data.holdings && data.holdings.length > 0) {
          savePortfolio({ holdings: data.holdings, updated: new Date().toLocaleString('zh-CN') });
          renderPortfolio();
          const platforms = {};
          data.holdings.forEach(h => { platforms[h.platform] = (platforms[h.platform] || 0) + 1; });
          const platStr = Object.entries(platforms).map(([k, v]) => k + ': ' + v + '笔').join(', ');
          document.getElementById('portFiles').innerHTML = '<span style="color:var(--green)">✅ 刷新完成：共 ' + data.total + ' 笔持仓 (' + platStr + ')</span>';
          document.getElementById('portFiles').style.display = 'block';
          return true;
        }
      }
    } else {
      // Just pull cached data
      const r = await fetch(SERVER_URL + '/api/portfolio');
      if (r.ok) {
        serverAvailable = true;
        const data = await r.json();
        if (data.holdings && data.holdings.length > 0) {
          savePortfolio(data);
          renderPortfolio();
          return true;
        }
      }
    }
  } catch (e) { serverAvailable = false; }
  return false;
}

// Sync fund detail cards to show ONLY portfolio holdings
function syncPortfolioCodes() {
  const codes = getCodes();
  if (!codes.length) return;
  document.getElementById('cacheHint').textContent = '持仓: ' + codes.join(', ');
  refreshAll();
}

// ======================== Init ========================
(async function init() {
  renderMarket();
  renderPortfolio();
  // Try to sync from local server first
  try {
    const r = await fetch(SERVER_URL + '/api/portfolio');
    if (r.ok) {
      serverAvailable = true;
      document.getElementById('serverStatus').innerHTML = '🟢 本地服务已连接';
      const data = await r.json();
      if (data.holdings && data.holdings.length > 0) {
        savePortfolio(data);
        renderPortfolio();
      }
    }
  } catch (e) {
    serverAvailable = false;
    document.getElementById('serverStatus').innerHTML = '🔴 本地服务未连接';
  }

  // Load fund detail cards from portfolio holdings only
  const codes = getCodes();
  if (codes.length) {
    document.getElementById('fundInput').placeholder = '输入6位基金代码，逗号分隔';
    document.getElementById('cacheHint').textContent = '持仓: ' + codes.join(', ');
    refreshAll();
  } else {
    document.getElementById('loadingMsg').style.display = 'none';
  }
  // Try live market data in background
  setTimeout(tryFetchVIX, 500);
  setTimeout(tryFetchFNG, 800);
})();

document.getElementById('fundInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFunds();
});
</script>
</body>
</html>
